<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Chwalik | Links</title>
    <meta name="description" content="Quick links to Andrew Chwalik's latest vlog, Patreon, and projects.">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="links-page">
    <main class="links-shell">
        <section class="links-card">
            <div class="links-header-art" aria-hidden="true">
                <img src="../img/links-header-image.png" alt="" class="links-header-image">
                <img src="../img/soccer-ball.gif" alt="" class="links-header-ball">
            </div>

            <div class="links-profile-wrap">
                <img src="../img/links-profile-image.jpg" alt="Andrew Chwalik" class="links-profile-image">
            </div>

            <div class="links-intro">
                <p class="links-eyebrow">@andrewchwalik</p>
                <h1>Andrew Chwalik</h1>
                <p class="links-description">Content, community, and the projects I&apos;m building.</p>
            </div>

            <div class="links-section">
                <h2>Featured links</h2>

                <a class="links-item" href="https://www.youtube.com/watch?v=xrza5E3FDzI&amp;list=PLzLEqDD8AalbilRUTFy1a4Z22oysBob35" target="_blank" rel="noopener noreferrer">
                    <span class="links-icon links-icon-youtube">
                        <i class="fa-brands fa-youtube" aria-hidden="true"></i>
                    </span>
                    <span class="links-copy">
                        <span class="links-label">Latest Vlog</span>
                        <span class="links-meta">Watch the newest video</span>
                    </span>
                    <span class="links-arrow" aria-hidden="true">
                        <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>

                <a class="links-item" href="https://www.patreon.com/c/andrewchwalik" target="_blank" rel="noopener noreferrer">
                    <span class="links-icon links-icon-patreon">
                        <i class="fa-brands fa-patreon" aria-hidden="true"></i>
                    </span>
                    <span class="links-copy">
                        <span class="links-label">Patreon</span>
                        <span class="links-meta">Support the work</span>
                    </span>
                    <span class="links-arrow" aria-hidden="true">
                        <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>

                <a class="links-item" href="https://firelandsunited.com/" target="_blank" rel="noopener noreferrer">
                    <span class="links-icon links-icon-firelands">
                        <i class="fa-solid fa-fire-flame-curved" aria-hidden="true"></i>
                    </span>
                    <span class="links-copy">
                        <span class="links-label">Firelands United</span>
                        <span class="links-meta">Visit the club site</span>
                    </span>
                    <span class="links-arrow" aria-hidden="true">
                        <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
